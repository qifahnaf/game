<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Crossword Hewan</title>
<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f0f8ff;
}

h1 {
    color: #333;
}

.grid {
    display: grid;
    grid-template-columns: repeat(6, 50px);
    gap: 5px;
    justify-content: center;
    margin: 20px;
}

input {
    width: 50px;
    height: 50px;
    text-align: center;
    font-size: 20px;
    text-transform: uppercase;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    margin-top: 20px;
    cursor: pointer;
}

.correct {
    background: #90ee90;
}

.wrong {
    background: #ffcccb;
}
</style>
</head>
<body>

<h1>🐾 Crossword Hewan</h1>

<p>Isi nama hewan di bawah ini:</p>

<div class="grid" id="grid"></div>

<button onclick="checkAnswer()">Cek Jawaban</button>

<script>
const answers = [
  "KUCING",
  "ANJING",
  "SINGA",
  "GAJAH",
  "IKAN",
  "ULAR"
];

const grid = document.getElementById("grid");

// buat kotak input
answers.forEach((word, i) => {
  for (let j = 0; j < word.length; j++) {
    let input = document.createElement("input");
    input.id = "cell-" + i + "-" + j;
    grid.appendChild(input);
  }
});

// cek jawaban
function checkAnswer() {
  answers.forEach((word, i) => {
    for (let j = 0; j < word.length; j++) {
      let input = document.getElementById("cell-" + i + "-" + j);
      if (input.value.toUpperCase() === word[j]) {
        input.classList.add("correct");
        input.classList.remove("wrong");
      } else {
        input.classList.add("wrong");
        input.classList.remove("correct");
      }
    }
  });
}
</script>

</body>
</html>
