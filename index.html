<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Game Tebak Hewan</title>
<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f0f8ff;
}

h1 {
    color: #333;
}

.word {
    font-size: 30px;
    letter-spacing: 10px;
    margin: 20px;
}

input {
    padding: 10px;
    font-size: 20px;
    text-align: center;
}

button {
    padding: 10px 20px;
    margin-top: 10px;
    font-size: 16px;
    cursor: pointer;
}

.correct {
    color: green;
}

.wrong {
    color: red;
}
</style>
</head>
<body>

<h1>🐾 Tebak Nama Hewan</h1>

<p>Susun huruf acak menjadi nama hewan!</p>

<div class="word" id="scrambled"></div>

<input type="text" id="answer" placeholder="Jawaban...">
<br>
<button onclick="checkAnswer()">Cek</button>

<p id="result"></p>

<script>
const words = ["kelinci","domba","burung","buaya","cicak","kura kura","Gajah","MONYET","Sapi","Burung","kambing","Kuda","KUCING", "ANJING", "SINGA", "GAJAH", "ULAR", "IKAN"];

let currentWord = "";
let scrambledWord = "";

function scramble(word) {
    return word.split('').sort(() => Math.random() - 0.5).join('');
}

function newGame() {
    currentWord = words[Math.floor(Math.random() * words.length)];
    scrambledWord = scramble(currentWord);
    document.getElementById("scrambled").innerText = scrambledWord;
    document.getElementById("answer").value = "";
    document.getElementById("result").innerText = "";
}

function checkAnswer() {
    let user = document.getElementById("answer").value.toUpperCase();
    if (user === currentWord) {
        document.getElementById("result").innerHTML = "✔ Benar!";
        document.getElementById("result").className = "correct";
        setTimeout(newGame, 1500);
    } else {
        document.getElementById("result").innerHTML = "❌ Coba lagi!";
        document.getElementById("result").className = "wrong";
    }
}

// mulai game pertama
newGame();
</script>

</body>
</html>
